<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Login data skor rekomendasi desa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      /* --- 1. TEXTURED BACKGROUNDS (CSS ONLY) --- */
      body {
        font-family: "Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        height: 100vh;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #333;

        /* Dot Matrix (Active) */
        background-color: #f0f2f5;
        background-image: radial-gradient(#cbd5e1 1.5px, transparent 1.5px);
        background-size: 24px 24px;

      }

      .login-box {
        background: rgba(255, 255, 255, 0.95);
        /* Slight opacity */
        padding: 2.5rem;
        width: 380px;
        /* Slightly wider for the split */
        border: 1px solid #d1d5db;
        /* Sharp shadow for retro feel */
        box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.1);
        border-radius: 16px;
        color: #323A45;
      }

      /* --- 2. SPLIT HEADER (40% Icon | 60% Text) --- */
      .login-header {
        display: flex;
        align-items: center;
        margin-bottom: 2rem;
        border-bottom: 2px solid #f3f4f6;
        padding-bottom: 1.5rem;
      }

      .header-icon {
        width: 40%;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #3b82f6;
        /* Blue icon */
      }

      .header-title {
        width: 60%;
        padding-left: 0rem;
      }

      /* Groups all heading elements to remove spacing */
      .header-title h1,
      .header-title h2,
      .header-title h3,
      .header-title h4,
      .header-title h5,
      .header-title h6,
      .header-title small {
        margin: 0;
        line-height: 1;
      }

      .header-title h2 {
        font-size: 2rem;
        color: #323A45;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .header-title h3,
      .header-title small {
        display: block;
        font-size: 1rem;
        color: #6b7280;
        font-weight: normal;
      }

      /* --- FORM ELEMENTS --- */
      .form-group {
        margin-bottom: 1.25rem;
      }

      label {
        display: block;
        margin-bottom: 0.4rem;
        font-weight: bold;
        font-size: 0.8rem;
        text-transform: uppercase;
        color: #4b5563;
      }

      input {
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
        border-radius: 6px;
        border: 2px solid #e5e7eb;
        background: #f9fafb;
        font-family: inherit;
        font-size: 0.95rem;
        transition: all 0.2s;
      }

      input:focus {
        outline: none;
        border-color: #3b82f6;
        background: #fff;
      }

      button {
        width: 100%;
        padding: 12px;
        background-color: #64748B;
        /* Dark Grey */
        border-radius: 6px;
        color: white;
        border: none;
        cursor: pointer;
        font-family: inherit;
        font-weight: bold;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: transform 0.1s, opacity 0.2s;
      }

      button:hover {
        background-color: #EFF1F3;
        color: #000;
      }

      button:active {
        transform: scale(0.98);
        opacity: 0.9;
      }

      .error-msg {
        background-color: #fef2f2;
        color: #991b1b;
        padding: 12px;
        margin-bottom: 20px;
        border-left: 4px solid #ef4444;
        font-size: 0.85rem;
        font-weight: bold;
      }
    </style>
  </head>

  <body>

    <div class="login-box">

      <div class="login-header">
        <div class="header-icon">
          <img 
          src="/static/images/logo.svg"
          width="68"
          height="68"
          alt="Login Icon">
        </div>

        <div class="header-title">
          <h2>Login</h2>
          <h3>Skor Rekomendasi Desa</h3>
        </div>
      </div>

      {% if error %}
      <div class="error-msg">
        ⚠ {{ error }}
      </div>
      {% endif %}

      <form
        action="/login"
        method="POST"
      >
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            required
            autofocus
            placeholder="Enter ID..."
          >
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            required
            placeholder="Enter Password..."
          >
        </div>
        <button type="submit">Sign In</button>
      </form>
    </div>

  </body>

</html>
