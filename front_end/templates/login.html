<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-200 h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded shadow-md w-96">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-700">Login data skor rekomendasi desa</h2>
        <form onsubmit="handleLogin(event)">
            <div class="mb-4">
                <label class="block text-sm font-bold mb-2">Username</label>
                <input type="text" id="user" class="w-full border p-2 rounded" placeholder="admin / user">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-bold mb-2">Password</label>
                <input type="password" id="pass" class="w-full border p-2 rounded" placeholder="admin / user">
            </div>
            <button class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">Login</button>
        </form>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            // Simple hardcoded check
            if (u === 'admin' && p === 'ubuntuServer2026') {
                // Set Cookie before redirecting
                // Expires in 1 day
                const d = new Date();
                d.setTime(d.getTime() + (24*60*60*1000));
                document.cookie = "session_token=admin_secret_123; expires="+ d.toUTCString() +"; path=/";
                
                window.location.href = '/admin';
            } else {
                alert("Invalid Credentials");
            }
}
    </script>
</body>
</html>
