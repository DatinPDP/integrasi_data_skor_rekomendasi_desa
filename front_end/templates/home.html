<!DOCTYPE html>
<html lang="en" x-data="PublicApp()">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Data Skor Rekomendasi Desa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link 
    href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&display=swap" 
    rel="stylesheet">
  <script defer src="/static/js/alpine.min.js"></script>
  <style>
    /* Global Layout - Locked Screen Height */
    body {
      font-family: 'Atkinson Hyperlegible', sans-serif;
      height: 100vh;
      margin: 0;
      overflow: hidden; /* Prevents whole-page scrolling */
      display: flex;
      justify-content: flex-end; /* Moves content to the right */
      align-items: flex-start;
      padding: 5rem 2rem 2rem 2rem;
      color: #333;

      /* Dot Matrix (Active) */
      background-color: #f0f2f5;
      background-image: radial-gradient(#cbd5e1 1.5px, transparent 1.5px);
      background-size: 24px 24px;
    }

    /* Detached Top Navigation Bar (Waybar Style) */
    .floating-top-navigation-bar {
      position: absolute;
      top: 1rem;
      left: 50%;
      /* Pinning left and right to exactly match body padding */
      left: 2rem;
      right: 2rem;
      margin-right: 1rem;
      margin-left: 1rem;
      background-color: #ffffff;
      border-radius: 16px;
      box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 1rem;
      z-index: 100;
    }

    .brand-logo-and-title {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .brand-logo-image {
      width: 2.5rem;
      height: 2.5rem;
      object-fit: contain;
    }

    .brand-title-text {
      font-size: 1.125rem;
      font-weight: 700;
      text-transform: uppercase;
      color: #1e293b;
      margin: 0;
    }

    .login-action-button {
      padding: 0.5rem 1.5rem;
      background-color: #64748B;
      color: white;
      font-weight: 700;
      border-radius: 12px;
      text-decoration: none;
      transition: background-color 0.2s ease-in-out;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .login-action-button:hover {
      background-color: #EFF1F3;
      color: #000;
    }

    /* Main Content Area */
    .main-content-wrapper {
      position: relative;
      width: 100%;
      max-width: calc(100vw - 50vw);
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 1rem;
      margin-right: 1rem;
      margin-left: 1rem;
      /* Ensures the wrapper fits in the remaining height and table scrolls */
      max-height: calc(100vh - 10rem); 
    }

    .styled-flat-card {
      box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.1);
      border-radius: 16px;
      background-color: #ffffff;
      border: 1px solid #e2e8f0;
    }

    /* Dropdown UI */
    .custom-metric-dropdown-container {
      position: relative;
      width: 100%;
      cursor: pointer;
      user-select: none;
      flex-shrink: 0; /* Prevents dropdown from crushing when table grows */
    }

    .dropdown-trigger-button {
      padding: 1rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 400;
      color: #323A45;
    }

    .dropdown-options-menu {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      margin-top: 0.5rem;
      z-index: 50;
      max-height: 300px;
      overflow-y: auto;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); 
    }

    .dropdown-option-item {
      padding: 0.75rem 1.25rem;
      transition: background-color 0.15s ease;
      color: #323A45;
    }

    .dropdown-option-item:hover {
      background-color: #f8fafc;
    }

    /* Table Rendering Container */
    .table-render-container {
      width: 100%;
      overflow-y: auto; /* Vertical scroll only here */
      overflow-x: auto; /* Horizontal scroll if columns exceed 700px */
    }

    .dashboard-data-table {
      width: 100%;
      text-align: left;
      border-collapse: separate; 
      border-spacing: 0;
    }

    .table-render-container {
      width: 100%;
      overflow-y: auto; 
      overflow-x: hidden; /* Prevents horizontal scroll */
    }

    .table-header-row th {
      position: sticky;
      top: 0; /* Freezes header row */
      background-color: #f8fafc;
      padding: 0.9rem;
      font-weight: 700;
      font-size: 0.75rem;
      text-transform: uppercase;
      white-space: normal;
      word-wrap: break-word;
      box-shadow: 0 1px 0 #e2e8f0; /* Sticky alternative to border-bottom */
      z-index: 10;
    }

    .table-data-cell {
      padding: 0.9rem;
      font-size: 0.875rem;
      white-space: normal;
      word-wrap: break-word;
      border-bottom: 1px solid #f1f5f9;
    }

    /* Styling specifically for the calculated Totals Row */
    .table-totals-row td {
      position: sticky;
      top: 43px; /* Offsets exactly below the sticky header */
      z-index: 9;
      background-color: #f8fafc;
      border-bottom: 2px solid #cbd5e1;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05); /* Slight shadow to detach from scrolling body */
    }

    /* Post-it Year Tabs */
    .year-tabs-container {
      position: absolute;
      left: -35px;
      top: 9rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      z-index: 20;
    }

    .year-tab {
      width: 35px;
      padding: 1rem 0;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(0deg);
      text-align: center;
      cursor: pointer;
      border-radius: 8px 0 0 8px;
      font-weight: 700;
      color: white;
      transition: width 0.15s, left 0.15s;
      box-shadow: -2px 2px 5px rgba(0,0,0,0.1);
    }
    .year-tab:hover { height: 45px; transform: rotate(0deg) translateY(-5px); }
    .year-tab.active { transform: rotate(0deg) translateY(-5px); box-shadow: -4px 4px 0px rgba(0,0,0,0.15); }

    /* Utility Indicators */
    .loading-indicator-text {
      padding: 3rem 0;
      width: 100%;
      text-align: center;
      font-weight: 700;
      font-size: 1.125rem;
      color: #323A45;
      animation: pulse-animation 2s infinite;
    }

    .empty-state-message {
      padding: 3rem 0;
      width: 100%;
      height: calc(100vh - 10rem); 
      text-align: center;
      font-style: italic;
      color: #64748b;
    }

    @keyframes pulse-animation {
      0%, 100% { opacity: 1; }
      50% { opacity: .5; }
    }

    /* Animation */
    @keyframes dropIn {
      0% { opacity: 0; transform: translateY(-10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .fade-in-on-load {
      animation: dropIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { margin: 1.5rem; background: transparent; border-radius: 5px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 5px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>

<body>
  <nav class="floating-top-navigation-bar">
    <div class="brand-logo-and-title">
      <img 
        src="/static/images/logo.svg"
        class="brand-logo-image"
        alt="Logo">
      <h1 class="brand-title-text">Capaian IKU Nasional</h1>
    </div>
    <a href="/login" class="login-action-button">Login</a>
  </nav>

  <main class="main-content-wrapper fade-in-on-load">

      <div class="year-tabs-container">
        <template x-for="(y, index) in dynamicYears" :key="y">
          <div class="year-tab" 
               :class="{ 'active': year == y }"
               :style="`background-color: ${tabColors[index % tabColors.length]};`"
               @click="setYear(y)" 
               x-text="y"></div>
        </template>
      </div>

    <div class="custom-metric-dropdown-container styled-flat-card" 
         x-data="{ dropdownOpen: false }" 
         @click.away="dropdownOpen = false">
         
      <div class="dropdown-trigger-button" @click="dropdownOpen = !dropdownOpen">
        <span x-text="selectedMetric ? selectedMetric : '-- Pilih Indikator --'"></span>
        <svg width="20" height="20" fill="none" stroke="#64748b" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path>
        </svg>
      </div>

      <div class="dropdown-options-menu styled-flat-card" x-show="dropdownOpen" style="display: none;" x-transition>
        <template x-for="metric in metrics" :key="metric">
          <div class="dropdown-option-item" 
               @click="selectedMetric = metric; dropdownOpen = false;"
               x-text="metric"></div>
        </template>
      </div>
    </div>

    <div x-show="isLoading" class="loading-indicator-text">
      Memuat Data...
    </div>

    <div x-show="!isLoading && selectedMetric && currentData.length > 0" 
         class="table-render-container styled-flat-card">
        <table class="dashboard-data-table">
          <thead>
            <tr class="table-header-row">
              <template x-for="col in Object.keys(currentData[0] || {})" :key="col">
                <th x-text="col.replace(/_/g, ' ')"></th>
              </template>
            </tr>
          </thead>
          <tbody>
            <template x-if="tableTotals">
              <tr class="table-totals-row">
                <template x-for="col in Object.keys(tableTotals)" :key="col">
                  <td class="table-data-cell" x-text="tableTotals[col]"></td>
                </template>
              </tr>
            </template>

            <template x-for="(row, index) in currentData" :key="index">
              <tr>
                <template x-for="col in Object.keys(row)" :key="col">
                  <td class="table-data-cell" x-text="col.toLowerCase().includes('capaian') ? row[col] + ' %' : row[col]"></td>
                </template>
              </tr>
            </template>
          </tbody>
        </table>
    </div>

    <div x-show="!isLoading && (!selectedMetric || currentData.length === 0)" 
         class="empty-state-message styled-flat-card" style="display: none;">
      Tidak ada data untuk indikator atau tahun ini.
    </div>

  </main>

  <script>
    function PublicApp() {
      return {
        year: new Date().getFullYear() - 1,
        dynamicYears: [],
        tabColors: ['#667b99', '#7589a4', '#8596ae', '#94a3b8', '#a3b0c2'],
        isLoading: true,
        metrics: [],
        currentData: [],
        selectedMetric: "",
        tableTotals: null,
        cache: {},

        async init() {
          // Generate Years from current year down to 2025
          const currentActualYear = new Date().getFullYear();
          for (let y = currentActualYear; y >= 2025; y--) {
            this.dynamicYears.push(String(y));
          }

          await this.loadMetricsForYear();

          // Watch for dropdown changes and fetch the exact metric payload
          this.$watch('selectedMetric', async (val) => {
            if (!val) {
              this.currentData = [];
              this.tableTotals = null;
              return;
            }
            await this.fetchData(val);
          });
        },

        async setYear(selectedYear) {
          if (this.year == selectedYear) return;
          
          this.year = selectedYear;
          this.selectedMetric = ""; 
          this.currentData = [];
          this.tableTotals = null;
          
          await this.loadMetricsForYear();
        },

        async loadMetricsForYear() {
          this.isLoading = true;
          const cacheKey = `metrics_${this.year}`;

          try {
            if (this.cache[cacheKey]) {
              this.metrics = this.cache[cacheKey];
            } else {
              const res = await fetch(`/public/dashboard/iku/${this.year}`);
              if(res.ok) {
                const json = await res.json();
                this.metrics = json.metrics || [];
                this.cache[cacheKey] = this.metrics; // Save to cache
              }
            }

            // Auto-select first metric to bypass empty state
            if (this.metrics.length > 0) {
              this.selectedMetric = this.metrics[0];
              await this.fetchData(this.selectedMetric);
            }
          } catch(e) { console.error(e); } 
          finally { this.isLoading = false; }
        },

        async fetchData(metric) {
          this.isLoading = true;
          this.currentData = [];
          this.tableTotals = null;
          const cacheKey = `data_${this.year}_${metric}`;

          try {
            if (this.cache[cacheKey]) {
              this.currentData = this.cache[cacheKey].data || [];
              this.tableTotals = this.cache[cacheKey].totals || null;
            } else {
              const url = `/public/dashboard/iku/${this.year}?metric=${encodeURIComponent(metric)}`;
              const res = await fetch(url);
              if (res.ok) {
                const json = await res.json();
                const responseData = json[metric] || { data: [], totals: null };
                
                this.currentData = responseData.data || [];
                this.tableTotals = responseData.totals || null;
                this.cache[cacheKey] = responseData;
              }
            }
          } catch(e) { console.error(e); } 
          finally { this.isLoading = false; }
        },

        // Method to sum and average the columns based on their names
      }
    }
  </script>
</body>
</html>
