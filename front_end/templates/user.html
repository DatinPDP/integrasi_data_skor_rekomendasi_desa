<!DOCTYPE html>
<html
  lang="en"
  x-data="UserDashboardApp()"
  :class="{ 'dark': isDarkModeEnabled }"
>

  <head>
    <meta charset="UTF-8">
    <title>User Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/spark-md5@3.0.2/spark-md5.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

    <script>
      tailwind.config = {
        darkMode: 'class',
      }
    </script>

    <style type="text/tailwindcss">
      @layer components {

      /* --- Custom Scrollbar --- */
      /* Webkit (Chrome/Edge/Safari) */
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: #f1f1f1; }
      ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 5px; }
      ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }

      /* Dark Mode Scrollbar */
      .dark ::-webkit-scrollbar-track { background: #0f172a; }
      /* slate-900 */
      .dark ::-webkit-scrollbar-thumb { background: #475569; border: 1px solid #0f172a; }
      /* slate-600 */
      .dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }
      /* slate-500 */
      .dark ::-webkit-scrollbar-corner { background: #0f172a; }

      /* ===========================
         5. AG GRID & TABLE OVERRIDES
         =========================== */
      .ag-theme-alpine {
        --ag-font-size: 13px;
        --ag-header-height: 32px;
        --ag-row-height: 32px;
      }
      .dark .ag-theme-alpine {
        --ag-background-color: #1e293b;
        --ag-foreground-color: #cbd5e1;
        --ag-border-color: #334155;
        --ag-header-background-color: #0f172a;
        --ag-row-hover-color: #334155;
      }

      /* Dashboard Custom Table */
      .dashboard-container {
        @apply overflow-auto h-full border border-gray-300 bg-white relative dark:bg-slate-900 dark:border-slate-700;
      }
      .dash-table {
        @apply border-collapse w-max min-w-full text-[13px] table-fixed p-1 font-mono;
      }
      /* Sticky Headers */
      .dash-table thead th {
        @apply bg-gray-100 text-slate-800 font-semibold border border-gray-300 p-1 sticky z-10 text-center
          align-middle h-8
        dark:bg-slate-900 dark:text-slate-200 dark:border-slate-600;
      }
      .dash-table thead tr:first-child th { top: 0; z-index: 11; }
      .dash-table thead tr:nth-child(2) th { top: 32px; z-index: 11; border-top: none; }
      
      .dash-table td {
        @apply border border-gray-300 p-0 pl-1 align-top text-slate-700 dark:border-slate-600 dark:text-slate-300;
      }
      .dash-table input {
        @apply w-full h-full border-none p-1 bg-transparent text-center outline-none focus:bg-blue-50 dark:focus:bg-slate-700;
      }
      
      /* Column Width Utilities (Preserved from your original CSS) */
      .col-no { width: 40px; min-width: 40px; }
      .col-dimensi { width: 40px; max-width: 100px; }
      .col-sub_dimensi { width: 40px; max-width: 200px; }
      .col-indikator { width: 40px; max-width: 200px; }
      .col-item { width: 300px; min-width: 150px; }
      .col-score { width: 60px; min-width: 60px; }
      .col-intervensi { min-width: 1100px; }
      .col-pusat { width: 200px; min-width: 150px; }
      .col-prov { width: 200px; min-width: 150px; }
      .col-kab { width: 200px; min-width: 150px; }
      .col-desa { width: 200px; min-width: 150px; }
      .col-lain { width: 200px; min-width: 150px; }

      .resizer {
        @apply absolute right-0 top-0 h-full w-[5px] bg-transparent cursor-col-resize select-none z-[100] hover:bg-blue-500;
      }
      .sticky-col { position: sticky; }
    }
  </style>
  </head>

  <body class="global_body_container font-mono bg-gray-100 h-screen flex flex-col transition-colors
  duration-300 dark:bg-slate-900 dark:text-slate-100">

    <div class="header_main_container bg-white text-slate-800 border-b border-gray-200 
    dark:bg-slate-800 dark:text-white dark:border-slate-700 p-3 flex justify-between items-center shadow-md z-20 shrink-0
    h-14 transition-colors duration-300">

      <div class="header_left_group flex items-center gap-1">

        <div
          class="transition-all duration-300 ease-in-out shrink-0 h-full flex items-center"
          :class="isSidebarOpen ?
          'w-80 opacity-100' 
          : 'w-0 opacity-0 overflow-hidden'"
        >
          <h1 class="header_title_label text-sm font-bold flex items-center gap-2 truncate h-8 w-full text-slate-700
            border-r border-gray-300 dark:text-slate-100 dark:border-slate-600/50">
            <span class="text-blue-600 dark:text-blue-400 flex items-center gap-1.5">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-4 h-4"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                <path d="M8 11h8"></path>
                <path d="M12 11v4"></path>
              </svg>
              <span>User</span>
            </span>

            <span class="text-gray-300 dark:text-gray-600">|</span>

            <span>Data skor rekomendasi desa</span>
          </h1>

        </div>

        <div class="header_toolbar_container rounded-md p-1 flex items-center gap-2 shadow-sm
          bg-gray-100 border border-gray-300
          dark:bg-slate-900/50 dark:border-slate-600 transition-colors">

          <div
            x-show="viewModeState === 'grid'"
            class="flex items-center gap-2 mr-1 pr-2 border-r border-gray-300 dark:border-slate-600"
            x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0 -translate-x-4 scale-95"
            x-transition:enter-end="opacity-100 translate-x-0 scale-100"
            x-transition:leave="transition ease-in duration-200"
            x-transition:leave-start="opacity-100 translate-x-0 scale-100"
            x-transition:leave-end="opacity-0 -translate-x-4 scale-95"
          >

            <div
              class="header_search_header relative"
              x-data="{ open: false, term: '' }"
              @click.outside="open = false"
            >
              <input
                type="text"
                x-model="term"
                @focus="open = true"
                @input="open = true"
                placeholder="Search headers..."
                class="rounded px-2 py-1 text-[11px] w-32 focus:w-64 transition-all duration-300 shadow-inner
                bg-white border border-gray-300 text-slate-800 placeholder-gray-400 focus:outline-none focus:border-blue-500
                dark:bg-slate-800 dark:border-slate-600 dark:text-white dark:placeholder-slate-500 dark:focus:bg-slate-700"
              >

              <div
                x-show="open && term"
                x-transition
                class="absolute top-full left-0 mt-2 w-max max-w-[600px] border rounded shadow-xl max-h-[80vh]
                overflow-y-auto z-50 custom-scrollbar
                bg-white border-gray-200 dark:bg-slate-800 dark:border-slate-700"
              >
                <template
                  x-for="col in meta_ColumnList.filter(c => c.toLowerCase().includes(term.toLowerCase()))"
                  :key="col"
                >
                  <button
                    @click="action_JumpToColumn(col); open = false; term = ''"
                    class="w-full text-left px-3 py-2 text-xs border-b block truncate
                    border-gray-100 hover:bg-blue-50 text-slate-700 
                    dark:border-slate-700 dark:hover:bg-slate-700 dark:text-slate-200"
                    :title="col"
                  > <span x-text="col"></span>
                  </button>
                </template>
                <div
                  x-show="meta_ColumnList.filter(c => c.toLowerCase().includes(term.toLowerCase())).length === 0"
                  class="px-3 py-2 text-xs text-gray-400 italic"
                >
                  No headers found
                </div>
              </div>
            </div>

            <div class="flex rounded p-0.5 border
              bg-white border-gray-200 
              dark:bg-slate-800 dark:border-slate-700">
              <button
                @click="ui_ToggleTranslate(false)"
                :class="!isTranslationActive ?
                'bg-slate-500 text-white shadow-sm' 
                : 'text-slate-500 hover:text-slate-900 hover:bg-gray-100 dark:text-gray-400 dark:hover:text-white dark:hover:bg-slate-700'"
                class="px-2 py-1 rounded text-[10px] font-bold transition-all flex items-center gap-1"
                title="Raw Numbers"
              >
                Raw
              </button>
              <button
                @click="ui_ToggleTranslate(true)"
                :class="isTranslationActive ?
                'bg-slate-500 text-white shadow-sm' 
                : 'text-slate-500 hover:text-slate-900 hover:bg-gray-100 dark:text-gray-400 dark:hover:text-white dark:hover:bg-slate-700'"
                class="px-2 py-1 rounded text-[10px] font-bold transition-all flex items-center gap-1"
                title="Text Recommendations"
              >
                Text
              </button>
            </div>
          </div>

          <div class="flex rounded p-0.5 border
            bg-white border-gray-200 
            dark:bg-slate-800 dark:border-slate-700">

            <button
              @click="ui_SwitchViewMode('grid')"
              :class="viewModeState === 'grid' ?
              'bg-slate-500 text-white shadow-sm' 
              : 'text-slate-500 hover:text-slate-900 hover:bg-gray-100 dark:text-gray-400 dark:hover:text-white dark:hover:bg-slate-700'"
              class="px-3 py-1 rounded text-[11px] font-bold transition-all flex items-center gap-1.5"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-3.5 h-3.5"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect
                  x="3"
                  y="3"
                  width="18"
                  height="18"
                  rx="2"
                  ry="2"
                ></rect>
                <line
                  x1="3"
                  y1="9"
                  x2="21"
                  y2="9"
                ></line>
                <line
                  x1="3"
                  y1="15"
                  x2="21"
                  y2="15"
                ></line>
                <line
                  x1="9"
                  y1="3"
                  x2="9"
                  y2="21"
                ></line>
                <line
                  x1="15"
                  y1="3"
                  x2="15"
                  y2="21"
                ></line>
              </svg>
              <span>Grid</span>
            </button>

            <button
              @click="ui_SwitchViewMode('dashboard')"
              :class="viewModeState === 'dashboard' ?
              'bg-slate-500 text-white shadow-sm' 
              : 'text-slate-500 hover:text-slate-900 hover:bg-gray-100 dark:text-gray-400 dark:hover:text-white dark:hover:bg-slate-700'"
              class="px-3 py-1 rounded text-[11px] font-bold transition-all flex items-center gap-1.5"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-3.5 h-3.5"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect
                  x="3"
                  y="3"
                  width="7"
                  height="9"
                ></rect>
                <rect
                  x="14"
                  y="3"
                  width="7"
                  height="5"
                ></rect>
                <rect
                  x="14"
                  y="12"
                  width="7"
                  height="9"
                ></rect>
                <rect
                  x="3"
                  y="16"
                  width="7"
                  height="5"
                ></rect>
              </svg>
              <span>Dashboard</span>
            </button>

          </div>

          <div class="h-6 w-px bg-gray-300 dark:bg-slate-600"></div>

          <div
            class="flex items-center rounded border ml-1 select-none h-7
            bg-white border-gray-200 
            dark:bg-slate-800 dark:border-slate-700"
            title="Freeze Columns (Scroll or Click Arrows)"
            @wheel.prevent="ui_Freeze_Scroll($event)"
          >

            <div class="pl-2 pr-1.5 text-blue-500 dark:text-blue-400 flex items-center justify-center">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="w-4 h-4 opacity-80"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect
                  x="3"
                  y="3"
                  width="18"
                  height="18"
                  rx="2"
                  ry="2"
                ></rect>
                <path d="M9 3v18" />
                <path d="M3 9h18" />
              </svg>
            </div>

            <div
              class="w-4 text-center text-[13px] font-bold font-mono leading-none
              text-slate-700 dark:text-white"
              x-text="ui_FreezeColCount"
            >
              0
            </div>

            <div class="flex flex-col px-1 h-full justify-center gap-[2px]">
              <button
                @click="ui_Freeze_Inc()"
                class="leading-none flex items-center h-2
                text-slate-400 hover:text-slate-800 
                dark:text-slate-500 dark:hover:text-white"
              >
                <svg
                  class="w-2.5 h-2.5"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="4"
                    d="M5 15l7-7 7 7"
                  />
                </svg>
              </button>
              <button
                @click="ui_Freeze_Dec()"
                class="leading-none flex items-center h-2
                text-slate-400 hover:text-slate-800 
                dark:text-slate-500 dark:hover:text-white"
              >
                <svg
                  class="w-2.5 h-2.5"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="4"
                    d="M19 9l-7 7-7-7"
                  />
                </svg>
              </button>
            </div>
          </div>

          <div class="h-6 w-px bg-gray-300 dark:bg-slate-600"></div>

          <button
            @click="action_CalculateDashboardStats"
            class="px-3 py-1 rounded text-[11px] font-bold transition-all shadow-sm flex items-center gap-1 group border
            bg-white hover:bg-emerald-50 text-emerald-600 border-gray-200 hover:border-emerald-300
            dark:bg-slate-800 dark:hover:bg-emerald-600 dark:text-emerald-500 dark:hover:text-white 
            dark:border-slate-700 dark:hover:border-emerald-500"
          >
            <span class="group-hover:animate-spin">↻</span> Hitung Skor
          </button>
        </div>
      </div>

      <div class="header_right_group flex items-center gap-4">

        <div class="flex items-center gap-2">
          <div
            x-show="filter_SelProv"
            x-transition
            class="flex items-center gap-1 bg-slate-500/10 border border-amber-500/30 px-2 py-1 rounded max-w-[150px]"
          >
            <span
              class="text-xs font-bold text-amber-600 dark:text-amber-400 truncate"
              x-text="filter_SelProv"
            ></span>
          </div>
          <div
            x-show="filter_SelKab"
            x-transition
            class="flex items-center gap-1 bg-slate-500/10 border border-amber-500/30 px-2 py-1 rounded max-w-[150px]"
          >
            <span
              class="text-xs font-bold text-amber-600 dark:text-amber-400 truncate"
              x-text="filter_SelKab"
            ></span>
          </div>
          <div
            x-show="filter_SelKec"
            x-transition
            class="flex items-center gap-1 bg-slate-500/10 border border-amber-500/30 px-2 py-1 rounded max-w-[150px]"
          >
            <span
              class="text-xs font-bold text-amber-600 dark:text-amber-400 truncate"
              x-text="filter_SelKec"
            ></span>
          </div>
          <div
            x-show="filter_NameSearch"
            x-transition
            class="flex items-center gap-1 bg-slate-500/10 border border-blue-500/30 px-2 py-1 rounded max-w-[150px]"
          >
            <span
              class="text-xs font-bold text-blue-600 dark:text-blue-400 truncate"
              x-text="filter_NameSearch"
            ></span>
          </div>
          <div
            x-show="filter_IdListInput && filter_IdListInput.trim()"
            x-transition
            class="flex items-center gap-1 bg-slate-500/10 border border-purple-500/30 px-2 py-1 rounded"
          >
            <span class="text-xs font-bold text-purple-600 dark:text-purple-400">Pasted IDs</span>
          </div>
        </div>

        <div class="flex items-center gap-4">
          <div class="flex flex-col items-end leading-none">
            <span class="text-slate-400 dark:text-slate-500 text-[9px] uppercase tracking-wider font-bold">Jumlah
              Desa</span>
            <span
              class="font-mono font-bold text-sm
              text-slate-700 dark:text-slate-200"
              x-text="stats_TotalRows"
            >0</span>
          </div>

          <div class="flex flex-col items-end leading-none border-l pl-4
            border-gray-200 dark:border-slate-700">
            <span class="text-slate-400 dark:text-slate-500 text-[9px] uppercase tracking-wider font-bold">Update
              Terakhir</span>
            <span
              class="font-mono font-bold text-sm
              text-emerald-600 dark:text-emerald-400"
              x-text="stats_LastUpdateLabel"
            >N/A</span>
          </div>
        </div>

        <div class="h-6 w-px bg-gray-300 dark:bg-slate-700"></div>

        <button
          @click="ui_ToggleDarkMode"
          class="header_btn_theme_toggle w-8 h-8 rounded transition border border-transparent flex items-center justify-center
          hover:bg-gray-100 hover:border-gray-300 text-black
          dark:hover:bg-slate-700 dark:text-yellow-400 dark:hover:border-slate-600"
          title="Toggle Theme"
        >
          <svg
            x-show="!isDarkModeEnabled"
            xmlns="http://www.w3.org/2000/svg"
            class="w-4 h-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343
              17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"
            />
          </svg>
          <svg
            x-show="isDarkModeEnabled"
            xmlns="http://www.w3.org/2000/svg"
            class="w-4 h-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"
            />
          </svg>
        </button>

        <div class="h-6 w-px bg-gray-300 dark:bg-slate-700"></div>

        <button
          @click="action_Logout"
          class="flex items-center gap-2 text-xs font-bold transition px-3 py-1.5 rounded
          bg-white border border-red-200 text-slate-500 hover:text-red-600 hover:bg-red-50
          dark:bg-slate-800 dark:border-red-900/50 dark:text-gray-400 dark:hover:text-red-300 dark:hover:bg-red-900/50"
        >
          <span>⏻</span> Logout
        </button>

      </div>
    </div>

    <div class="main_layout_wrapper flex flex-1 overflow-hidden">

      <div
        :class="isSidebarOpen ?
        'w-80' 
        : 'w-0'"
        class="sidebar_animation_wrapper
        relative z-20 shrink-0 transition-all
        duration-300 ease-in-out bg-white dark:bg-slate-800"
      >

        <button
          @click="isSidebarOpen = !isSidebarOpen"
          class="sidebar_toggle_btn
          absolute -right-3 top-20 w-6 h-6 bg-slate-500 border border-slate-200
          dark:border-slate-600 dark:bg-slate-500 rounded-md shadow-md z-50 flex items-center
          justify-center cursor-pointer text-slate-100 dark:text-slate-900
          transform transition-transform duration-300 focus:outline-none"
          :class="isSidebarOpen ?
          'rotate-0' 
          : 'rotate-180'"
          title="Toggle Sidebar"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-4 h-4"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="3"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>

        <div class="sidebar_content_clipper h-full w-full overflow-hidden flex flex-col
              border-r border-slate-200 dark:border-slate-700">

          <div class="sidebar_inner_content w-80 h-full overflow-y-auto custom-scrollbar flex flex-col p-4">

            <div
              class="sidebar_section_upload mb-5 border-b border-gray-100 pb-4 dark:border-slate-700"
              x-data="{ open: false }"
            >
              <div
                @click="open = !open"
                class="flex justify-between items-center cursor-pointer mb-3 group select-none"
              >
                <h3 class="sidebar_section_title text-xs font-bold text-gray-400 uppercase tracking-wider 
                  group-hover:text-gray-600 dark:group-hover:text-gray-300 transition-colors flex items-center gap-2">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="w-3.5 h-3.5"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line
                      x1="12"
                      y1="3"
                      x2="12"
                      y2="15"
                    ></line>
                  </svg>
                  Download
                </h3>

                <span
                  class="text-gray-400 text-[14px] font-bold transition-transform duration-200"
                  :class="open ?
                  'rotate-90' 
                  : 'rotate-0'"
                >›</span>
              </div>

              <div
                x-show="open"
                x-collapse
              >
                <div class="sidebar_upload_group space-y-3">
                  <div class="sidebar_upload_label_group flex items-center gap-2 mb-1">
                    <span class="text-[12px] font-bold text-slate-500 uppercase tracking-wider dark:text-slate-400">
                      Download
                    </span>
                    <div class="h-px bg-slate-200 flex-1 dark:bg-slate-700"></div>
                  </div>

                  <button
                    @click="action_DownloadServerSide"
                    class="sidebar_btn_download_excel w-full border

    <div

          toast: { show: false, msg: '', type: 'info', timeout: null },

          // Helper: Show Toast
          showToast(msg, type = 'info') {
              clearTimeout(this.toast.timeout);
              this.toast.msg = msg;
              this.toast.type = type;
              this.toast.show = true;
              // Auto-hide if not loading
              if (!msg.toLowerCase().includes('calculat') && !msg.toLowerCase().includes('delet')) {
                  this.toast.timeout = setTimeout(() => { this.toast.show = false }, 3000);
              }
          },
          
          // Helper: Show Modal
          showModal(title, msg, type = 'info', cb = null) {
              this.modal = { show: true, type, title, msg, callback: cb };
          },

          confirmAction() {
              if (this.modal.callback) this.modal.callback();
              this.modal.show = false;
          }
      }"
      x-init="
          // Listen for legacy Alpine variables from parent
          $watch('$store.app.setUiStatusMessage', val => val ? showToast(val, 'info') : (toast.show = false));

          // Listen for legacy Alert State
          $watch('ui_AlertState', val => { 
              if(val.isOpen) showModal(val.title, val.message, val.type, val.confirmCallback); 
          });

          // Listen for Global Window Events (For Login Page or detached scripts)
          window.addEventListener('show-toast', e => showToast(e.detail.msg, e.detail.type));
          window.addEventListener('show-alert', e => showModal(e.detail.title, e.detail.msg, e.detail.type));

    <script>
      function UserDashboardApp() {
        // --- DYNAMIC YEAR CALCULATION ---
        const dateNow = new Date();
        const currentActualYear = dateNow.getFullYear();
        const defaultSelectedYear = currentActualYear - 1;
        // Generate available years dynamically
        const dynamicYears = [];
        for (let i = 0; i < 4; i++) {
          dynamicYears.push(String(currentActualYear - i));
        }

        return {
          // --- CONFIGURATION ---
          apiBaseUrl: "{{ api_url }}",
          targetYear: String(defaultSelectedYear),
          availableYears: dynamicYears,

          // --- GLOBAL STATE ---
          isSidebarOpen: true,
          viewModeState: 'grid', // 'grid' | 'dashboard'
          isDarkModeEnabled: localStorage.getItem('theme') === 'dark',
          isTableStructureLoaded: false,
          ui_FreezeColCount: 0,

          // --- MODALS & MESSAGES ---
          setUiStatusMessage: "",

          // --- DATA STORAGE ---
          meta_VersionsList: [], // From /history/versions
          meta_HierarchyTree: {}, // From /history/versions (used for dropdowns)
          agGridApiInstance: null, // AG Grid Object
          meta_ColumnList: [],
          history_OpenDetailsId: null, // Tracks which card is expanded
          history_DiffCache: {},       // Caches diffs so we don't re-fetch on every toggle

          // --- FILTERS & INPUTS ---
          isTranslationActive: false, // Toggle 1-5 vs Text
          filter_SelectedVersion: "", // Timestamp string
          filter_SelProv: "",
          filter_SelKab: "",
          filter_SelKec: "",
          filter_NameSearch: "",
          filter_IdListInput: "", // For search

          // --- UI DISPLAY STATS ---
          stats_TotalRows: "0",
          stats_LastUpdateLabel: "N/A",

          // --- CUSTOM ALERT STATE ---
          ui_AlertState: {
            isOpen: false,
            type: 'info', // 'info', 'success', 'error', 'confirm'
            title: '',
            message: '',
            confirmCallback: null // Function to run if user clicks "Yes"
          },

          // --- REUSABLE HELPERS ---
          util_Alert(title, message, type = 'info') {
            this.ui_AlertState = {
              isOpen: true,
              type: type,
              title: title,
              message: message,
              confirmCallback: null
            };
          },
          util_Confirm(title, message, callback) {
            this.ui_AlertState = {
              isOpen: true,
              type: 'confirm',
              title: title,
              message: message,
              confirmCallback: callback
            };
          },
          async action_ConfirmModal() {
            if (this.ui_AlertState.confirmCallback) {
              await this.ui_AlertState.confirmCallback();
            }
            this.ui_AlertState.isOpen = false;
          },

          // ============================================
          // INITIALIZATION
          // ============================================
          init() {
            this.initializeAgGridConfig();
            this.fetchVersionHistoryAndHierarchy();
            this.fetch_MainGridData_FromAPI();
          },

          ui_ToggleDarkMode() {
            this.isDarkModeEnabled = !this.isDarkModeEnabled;
            localStorage.setItem('theme', this.isDarkModeEnabled ? 'dark' : 'light');
          },

          // ============================================
          // FREEZE HANDLER & CONTROLS
          // ============================================
          ui_Freeze_Inc() {
            if (this.ui_FreezeColCount < 6) {
              this.ui_FreezeColCount++;
              this.ui_ApplyFreeze();
            }
          },
          ui_Freeze_Dec() {
            if (this.ui_FreezeColCount > 0) {
              this.ui_FreezeColCount--;
              this.ui_ApplyFreeze();
            }
          },
          ui_Freeze_Scroll(e) {
            // DeltaY > 0 means scrolling down (Decrement)
            // DeltaY < 0 means scrolling up (Increment)
            if (e.deltaY < 0) this.ui_Freeze_Inc();
            else this.ui_Freeze_Dec();
          },

          ui_ApplyFreeze() {
            const count = this.ui_FreezeColCount;

            // APPLY TO AG GRID
            if (this.agGridApiInstance) {
              const cols = this.agGridApiInstance.getColumns();
              if (cols) {
                // Pin the first N columns to the left
                const state = cols.map((c, i) => ({
                  colId: c.getColId(),
                  pinned: i < count ? 'left' : null
                }));
                this.agGridApiInstance.applyColumnState({state: state, defaultState: {pinned: null}});
              }
            }

            // APPLY TO DASHBOARD HTML TABLE
            const table = document.getElementById('dashboard_table_element');
            if (table) {
              // Reset all sticky styles first
              table.querySelectorAll('.sticky-col').forEach(el => {
                el.style.position = '';
                el.style.left = '';
                el.style.zIndex = '';
                el.style.backgroundColor = '';
                el.classList.remove('sticky-col');
              });

              if (count > 0) {
                // Get widths of the first N header columns
                // assume headers are in the first row of THEAD
                const headers = table.querySelectorAll('thead tr:first-child th[data-col-idx]');
                let currentLeft = 0;

                for (let i = 0; i < count; i++) {
                  if (!headers[i]) continue;

                  const width = headers[i].getBoundingClientRect().width;

                  // Select all cells (TH and TD) with this column index
                  const cells = table.querySelectorAll(`[data-col-idx="${i}"]`);

                  cells.forEach(cell => {
                    cell.style.position = 'sticky';
                    cell.style.left = `${currentLeft}px`;
                    // Headers need higher z-index to sit on top of scrolling rows
                    // Merged body cells also need z-index to sit above standard scrolling cells
                    cell.style.zIndex = cell.tagName === 'TH' ? '30' : '20';

                    // CRITICAL: Sticky cells need a background or text behind them shows through
                    // Check for dark mode class on HTML body to decide color
                    const isDark = document.documentElement.classList.contains('dark');

                    // Dark Mode: Header = Slate-800 (#1e293b), Body = Slate-900 (#0f172a)
                    // Light Mode: Header = Gray-100 (#f2f2f2), Body = White (#ffffff)
                    if (isDark) {
                      cell.style.backgroundColor = (cell.tagName === 'TH') ? '#1e293b' : '#0f172a';
                    } else {
                      cell.style.backgroundColor = (cell.tagName === 'TH') ? '#f2f2f2' : '#ffffff';
                    }

                    cell.classList.add('sticky-col');
                  });

                  currentLeft += width;
                }
              }
            }
          },

          // ============================================
          // Logout Handler
          // ============================================
          async action_Logout() {
            try {
              // Call Backend to kill the HttpOnly cookie
              await fetch(`${this.apiBaseUrl}/api/logout`, {
                method: "POST",
                credentials: 'include'
              });
            } catch (e) {
              console.error("Logout error:", e);
            } finally {
              // Force redirect to login page
              window.location.href = "/login";
            }
          },

          // ============================================
          // ACTIONS: Version Diff sidebar 
          // ============================================
          ui_LoadVersion(ts) {
            this.filter_SelectedVersion = ts;
            this.fetch_MainGridData_FromAPI();
          },

          // Header search
          action_JumpToColumn(colName) {
            // Force switch to Grid View if not already there
            if (this.viewModeState !== 'grid') {
              this.ui_SwitchViewMode('grid');
            }

            // Scroll and Highlight
            setTimeout(() => {
              if (this.agGridApiInstance) {
                // Scroll horizontally to the column
                this.agGridApiInstance.ensureColumnVisible(colName);

                // Flash the column to catch the eye
                this.agGridApiInstance.flashCells({columns: [colName], flashDelay: 1000, fadeDelay: 500});
              }
            }, 100); // Short delay to allow View Switch to render
          },

          // Fetch & Toggle Details
          async ui_ToggleHistoryDetails(ts) {
            if (this.history_OpenDetailsId === ts) {
              this.history_OpenDetailsId = null;
              return;
            }
            this.history_OpenDetailsId = ts;

            if (this.history_DiffCache[ts]) return;

            try {
              let res = await fetch(`${this.apiBaseUrl}/history/details/${this.targetYear}?version=${ts}`, {credentials: 'include'});
              let data = await res.json();

              let changes = data.changes || [];

              // Helper to format count: returns ">9999" if limit hit
              const getCount = (type) => {
                const count = changes.filter(x => x.type === type).length;
                return count >= 9999 ? '>9999' : count;
              };

              // Attach stats to the array property (safe, won't affect x-for loops)
              changes.ui_stats = {
                ADD: getCount('ADD'),
                MOD: getCount('MOD'),
                DEL: getCount('DEL')
              };

              this.history_DiffCache[ts] = changes;

            } catch (e) {
              console.error(e);
              this.util_Alert("Error", "Failed to load history details.", "error");
            }
          },

          // ============================================
          // VIEW SWITCHING
          // ============================================
          ui_SwitchViewMode(mode) {
            this.viewModeState = mode;
            if (mode === 'dashboard') {
              this.fetchDashboardConfigAndRenderTable();
            } else {
              // Refresh grid layout if switching back
              setTimeout(() => {
                if (this.agGridApiInstance) this.agGridApiInstance.sizeColumnsToFit();
              }, 50);
            }
          },

          ui_ToggleTranslate(val) {
            this.isTranslationActive = val;
            this.fetch_MainGridData_FromAPI();
          },

          // ============================================
          // ACTIONS: YEAR & FILTER
          // ============================================
          action_YearChanged() {
            // Reset filters when changing year to avoid confusing states
            this.filter_SelectedVersion = "";
            this.filter_SelProv = "";
            this.filter_SelKab = "";
            this.filter_SelKec = "";
            this.stagingData_Object = null;
            this.stats_TotalRows = "0";
            this.stats_LastUpdateLabel = "N/A";
            this.history_DiffCache = {}; // <--- CLEAR CACHE for sidebar diff
            this.history_OpenDetailsId = null; // <--- RESET UI for sidebar diff

            // Reload Data
            this.fetchVersionHistoryAndHierarchy();
            this.fetch_MainGridData_FromAPI();
          },

          // ============================================
          // AG-GRID LOGIC
          // ============================================
          initializeAgGridConfig() {
            const gridOptions = {
              rowModelType: 'infinite',
              cacheBlockSize: 10000,
              infiniteInitialRowCount: 10000,
              columnDefs: [],
              defaultColDef: {
                sortable: true,
                filter: true,
                resizable: true,
                minWidth: 120,
                flex: 1,
                wrapText: false,
                autoHeight: false
              },
              pagination: false,
              rowBuffer: 20,
              rowSelection: 'multiple',
              animateRows: false,
              suppressRowClickSelection: true,
              debounceVerticalScrollbar: true,
              enableCellTextSelection: true,
              ensureDomOrder: true
            };
            // Capture API instance correctly for v31+
            this.agGridApiInstance = agGrid.createGrid(document.getElementById('ag_grid_element'), gridOptions);
          },

          // ============================================
          // DATA FETCHING
          // ============================================
          util_GetKabOptions() {
            return (this.filter_SelProv && this.meta_HierarchyTree[this.filter_SelProv])
              ? Object.keys(this.meta_HierarchyTree[this.filter_SelProv]).sort()
              : [];
          },
          util_GetKecOptions() {
            return (this.filter_SelProv && this.filter_SelKab && this.meta_HierarchyTree[this.filter_SelProv][this.filter_SelKab])
              ? this.meta_HierarchyTree[this.filter_SelProv][this.filter_SelKab].sort()
              : [];
          },

          async fetch_MainGridData_FromAPI() {
            if (!this.agGridApiInstance) {
              console.error("❌ AG Grid API not ready yet.");
              return;
            }

            const dataSource = {
              rowCount: null,
              getRows: async (params) => {
                const offset = params.startRow;
                const limit = params.endRow - params.startRow;

                let urlParams = new URLSearchParams({
                  limit: limit,
                  offset: offset,
                  translate: this.isTranslationActive
                });

                // --- Handle Sorting ---
                // params.sortModel looks like: [{ colId: 'colName', sort: 'asc' }]
                if (params.sortModel && params.sortModel.length > 0) {
                  const sortState = params.sortModel[0];
                  urlParams.append("sort_by", sortState.colId);
                  urlParams.append("sort_dir", sortState.sort); // 'asc' or 'desc'
                }

                // --- Handle Column Filters ---
                // If you want the little filter menu on the column headers to work
                if (params.filterModel && Object.keys(params.filterModel).length > 0) {
                  urlParams.append("filterModel", JSON.stringify(params.filterModel));
                }

                // Existing Sidebar Filters
                if (this.filter_SelectedVersion) urlParams.append("version", this.filter_SelectedVersion);
                if (this.filter_SelProv) urlParams.append("Provinsi", this.filter_SelProv);
                if (this.filter_SelKab) urlParams.append("Kabupaten/ Kota", this.filter_SelKab);
                if (this.filter_SelKec) urlParams.append("Kecamatan", this.filter_SelKec);
                if (this.filter_NameSearch) urlParams.append("Desa", this.filter_NameSearch);
                // Ensure Newlines are replaced with semicolons for ID list
                if (this.filter_IdListInput.trim()) urlParams.append("ids", this.filter_IdListInput.replace(/\n/g, ";"));

                try {
                  // Only show loading if it's a primary load, otherwise it flickers too much
                  if (offset === 0) this.agGridApiInstance.showLoadingOverlay();

                  const reqUrl = `${this.apiBaseUrl}/query/${this.targetYear}?${urlParams}`;
                  let res = await fetch(reqUrl, {credentials: 'include'});

                  if (res.status === 401) {
                    window.location.href = "/login";
                    return;
                  }

                  if (!res.ok) {
                    throw new Error(`Server returned status ${res.status}`);
                  }

                  let data = await res.json();

                  let totalCount = parseInt(res.headers.get("X-Total-Count") || "0");

                  this.stats_TotalRows = totalCount.toLocaleString();

                  if (Array.isArray(data)) {
                    // DYNAMIC COLUMNS: Only set if we have data and columns aren't set yet
                    if (data.length > 0) {
                      const firstRowKeys = Object.keys(data[0]);

                      // Check if we need to update columns (only on first load or structure change)
                      const currentCols = this.agGridApiInstance.getColumnDefs();
                      if (!currentCols || currentCols.length === 0) {
                        this.meta_ColumnList = firstRowKeys;
                        let cols = firstRowKeys.map(k => ({
                          field: k,
                          headerName: k,
                          tooltipField: k,
                          filter: true,
                          sortable: true,
                          // Safety: Handle missing data fields
                          valueGetter: p => (p.data && p.data[k] !== undefined) ? p.data[k] : ""
                        }));
                        this.agGridApiInstance.setGridOption('columnDefs', cols);
                      }
                    }

                    params.successCallback(data, totalCount);

                    if (totalCount === 0) {
                      this.agGridApiInstance.showNoRowsOverlay();
                    } else {
                      this.agGridApiInstance.hideOverlay();
                    }
                  } else {
                    console.error("❌ [AG-Grid] Data is not an array:", data);
                    params.failCallback();
                  }
                } catch (e) {
                  console.error("❌ [AG-Grid] Error in getRows:", e);
                  this.agGridApiInstance.showNoRowsOverlay(); // Or show error
                  params.failCallback();
                }
              }
            };

            this.agGridApiInstance.setGridOption('datasource', dataSource);
          },

          async fetchVersionHistoryAndHierarchy() {
            try {
              // Reusing the /history/versions endpoint but it now returns { versions: [], hierarchy: {} }
              // Added credentials
              let res = await fetch(`${this.apiBaseUrl}/history/versions/${this.targetYear}`, {credentials: 'include'});
              if (res.ok) {
                let data = await res.json();

                // Assign Versions
                this.meta_VersionsList = data.versions || [];
                if (this.meta_VersionsList.length > 0 && !this.filter_SelectedVersion) {
                  this.stats_LastUpdateLabel = this.meta_VersionsList[0].ts;
                }

                // Assign Hierarchy
                this.meta_HierarchyTree = data.hierarchy || {};
              }
            } catch (e) {console.error("Meta Fetch Error", e);}
          },

          // ============================================
          // DASHBOARD TABLE LOGIC
          // ============================================
          async fetchDashboardConfigAndRenderTable() {
            await this.calculate_DashboardStats_FromAPI();
          },

          // ============================================
          // ACTIONS: CALCULATION
          // ============================================
          async calculate_DashboardStats_FromAPI() {
            // Prepare UI
            const container = document.getElementById('dashboard_table_element');
            // Clear existing and show loading
            container.innerHTML = '<tbody><tr><td class="text-center p-4">Calculating & Rendering on Server...</td></tr></tbody>';

            // Add all current filters to params (Same logic as fetchData)
            let params = new URLSearchParams();
            if (this.filter_SelectedVersion) params.append("version", this.filter_SelectedVersion);
            if (this.filter_SelProv) params.append("Provinsi", this.filter_SelProv);
            if (this.filter_SelKab) params.append("Kabupaten/ Kota", this.filter_SelKab);
            if (this.filter_SelKec) params.append("Kecamatan", this.filter_SelKec);
            if (this.filter_NameSearch) params.append("Kode Wilayah Administrasi Desa", this.filter_NameSearch);
            if (this.filter_IdListInput.trim()) params.append("ids", this.filter_IdListInput.replace(/\n/g, ";"));

            try {
              // Use targetYear
              // Added credentials
              let res = await fetch(`${this.apiBaseUrl}/dashboard/calculate/${this.targetYear}?${params.toString()}`, {
                method: "POST",
                credentials: 'include'
              });
              if (!res.ok) throw new Error("Calculation failed");

              if (!res.ok) throw new Error("Server Calculation Failed");

              // Inject HTML
              let htmlContent = await res.text();
              container.innerHTML = htmlContent;

              // Attach Resize Listeners to the new DOM elements
              this.ui_InitResizers();

              // Re-apply Sticky Headers (Freeze) logic since DOM is new
              this.$nextTick(() => this.ui_ApplyFreeze());

            } catch (e) {
              console.error(e);
              container.innerHTML = `<tbody><tr><td class="text-red-500 p-4">Error: ${e.message}</td></tr></tbody>`;
            }
          },

          // Resizers
          // This replaces util_AddColumnResizer. 
          // It doesn't CREATE divs (Server did that), it just activates them.
          ui_InitResizers() {
            const table = document.getElementById('dashboard_table_element');
            const resizers = table.querySelectorAll('.resizer');

            resizers.forEach(resizer => {
              const th = resizer.parentElement;

              let x = 0;
              let w = 0;

              const mouseMoveHandler = (e) => {
                const dx = e.clientX - x;
                th.style.width = `${Math.max(30, w + dx)}px`;
                th.style.minWidth = th.style.width; // Enforce

                // Re-calc freeze positions if a column width changes
                if (this.ui_FreezeColCount > 0) {
                  this.ui_ApplyFreeze();
                }
              };

              const mouseUpHandler = () => {
                document.removeEventListener('mousemove', mouseMoveHandler);
                document.removeEventListener('mouseup', mouseUpHandler);
                resizer.classList.remove('resizing');
              };

              resizer.addEventListener('mousedown', (e) => {
                x = e.clientX;
                w = parseInt(window.getComputedStyle(th).width, 10);

                document.addEventListener('mousemove', mouseMoveHandler);
                document.addEventListener('mouseup', mouseUpHandler);
                resizer.classList.add('resizing');
                e.stopPropagation(); // Prevent header click events
              });
            });
          },

          // Explicit Action for Button Click (Force Switch)
          async action_CalculateDashboardStats() {
            this.ui_SwitchViewMode('dashboard');
            await this.calculate_DashboardStats_FromAPI();
          },

          // ============================================
          // ACTIONS: EXPORT/DOWNLOADS
          // ============================================

          // Server-side downloads
          action_DownloadServerSide() {
            this.setUiStatusMessage = "Downloading...";

            // Get Base Filters
            let params = new URLSearchParams({
              translate: this.isTranslationActive,
              Provinsi: this.filter_SelProv,
              "Kabupaten/ Kota": this.filter_SelKab,
              Kecamatan: this.filter_SelKec,
              Desa: this.filter_NameSearch
            });

            if (this.filter_SelectedVersion) params.append("version", this.filter_SelectedVersion);
            if (this.filter_IdListInput.trim()) params.append("ids", this.filter_IdListInput.replace(/\n/g, ";"));

            // Get Sorting from AG Grid
            if (this.agGridApiInstance) {
              const sortState = this.agGridApiInstance.getColumnState().find(s => s.sort != null);
              if (sortState) {
                params.append("sort_by", sortState.colId);
                params.append("sort_dir", sortState.sort);
              }
            }

            // Trigger Download (Open in new tab to force download)
            // We use window.open because it handles the file download headers automatically
            const url = `${this.apiBaseUrl}/download/excel/${this.targetYear}?${params.toString()}`;
            window.open(url, '_blank');

            setTimeout(() => this.setUiStatusMessage = "", 2000);
          },

        }
      }
    </script>
