<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>
    <style>.ag-theme-alpine { --ag-font-size: 13px; }</style>
</head>
<body class="bg-gray-100 h-screen flex flex-col" x-data="adminApp()">

    <div class="bg-slate-800 text-white p-4 flex justify-between items-center shadow-md">
        <h1 class="text-lg font-bold">🛡️ Admin Dashboard</h1>
        <div class="text-sm text-gray-400">Connected to: <span x-text="apiUrl"></span></div>
    </div>

    <div class="flex flex-1 overflow-hidden">
        <div class="w-80 bg-white border-r p-4 flex flex-col overflow-y-auto">
            
            <div class="mb-6 border-b pb-4">
                <h3 class="text-xs font-bold text-gray-500 uppercase mb-2">⏳ History / Versions</h3>
                <select x-model="selectedVersion" @change="fetchData" class="w-full border p-2 rounded text-sm bg-blue-50">
                    <option value="">🟢 Live (HEAD)</option>
                    <template x-for="v in versions" :key="v.ts">
                        <option :value="v.ts" x-text="'📄 ' + v.label"></option>
                    </template>
                </select>
            </div>

            <div class="mb-6 border-b pb-4">
                <h3 class="text-xs font-bold text-gray-500 uppercase mb-2">🔍 Filter by IDs</h3>
                <textarea 
                    x-model="idList" 
                    placeholder="Paste IDs here (comma/newline)..."
                    class="w-full border p-2 rounded text-sm h-32 font-mono"
                ></textarea>
                <button @click="fetchData" class="mt-2 w-full bg-slate-700 text-white py-1 rounded hover:bg-slate-800 text-sm">
                    Apply Filter
                </button>
            </div>

            <div>
                <h3 class="text-xs font-bold text-gray-500 uppercase mb-2">📤 Upload Update</h3>
                
                <div x-show="!stagingData">
                    <input type="file" @change="handleStage" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-violet-50 file:text-violet-700 hover:file:bg-violet-100"/>
                    <p x-text="statusMsg" class="text-xs mt-2 text-blue-600"></p>
                </div>

                <div x-show="stagingData" class="bg-yellow-50 p-3 rounded border border-yellow-200">
                    <p class="text-xs font-bold text-slate-700 mb-2 truncate" x-text="'File: ' + (stagingData ? stagingData.filename : '')"></p>
                    
                    <div class="grid grid-cols-3 gap-1 mb-3 text-center">
                        <div class="bg-green-100 p-1 rounded">
                            <div class="text-xs text-green-700 font-bold">Add</div>
                            <div class="text-sm font-mono" x-text="stagingData?.diff.added"></div>
                        </div>
                        <div class="bg-blue-100 p-1 rounded">
                            <div class="text-xs text-blue-700 font-bold">Mod</div>
                            <div class="text-sm font-mono" x-text="stagingData?.diff.changed"></div>
                        </div>
                        <div class="bg-red-100 p-1 rounded">
                            <div class="text-xs text-red-700 font-bold">Del</div>
                            <div class="text-sm font-mono" x-text="stagingData?.diff.removed"></div>
                        </div>
                    </div>

                    <div class="flex gap-2">
                        <button @click="confirmCommit" class="flex-1 bg-green-600 text-white py-1 rounded text-sm hover:bg-green-700 font-bold">
                            Confirm
                        </button>
                        <button @click="stagingData = null; statusMsg = ''" class="bg-gray-300 text-gray-700 px-3 rounded text-sm hover:bg-gray-400">
                            ✕
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex-1 p-4 relative">
            <div id="myGrid" class="ag-theme-alpine w-full h-full"></div>
        </div>
    </div>

    <script>
        function adminApp() {
            return {
                apiUrl: "{{ api_url }}",
                year: "2025",
                gridOptions: null,
                versions: [],
                selectedVersion: "",
                idList: "",
                statusMsg: "",
                
                // Staging State
                stagingData: null,

                init() {
                    this.gridOptions = {
                        rowData: [],
                        columnDefs: [],
                        defaultColDef: { sortable: true, filter: true, resizable: true },
                        pagination: true,
                        paginationPageSize: 100
                    };
                    new agGrid.Grid(document.getElementById('myGrid'), this.gridOptions);
                    
                    this.fetchVersions();
                    this.fetchData();
                },

                async fetchVersions() {
                    try {
                        let res = await fetch(`${this.apiUrl}/history/versions/${this.year}`);
                        if(res.ok) this.versions = await res.json();
                    } catch(e) { console.error(e); }
                },

                async fetchData() {
                    this.gridOptions.api.showLoadingOverlay();
                    let params = new URLSearchParams({ limit: 1000 });
                    
                    if (this.idList.trim()) {
                        let cleanIds = this.idList.replace(/\n/g, ",").trim();
                        params.append("ids", cleanIds);
                    }
                    
                    if (this.selectedVersion) {
                        params.append("version", this.selectedVersion);
                    }

                    try {
                        let res = await fetch(`${this.apiUrl}/query/${this.year}?${params}`);
                        let data = await res.json();
                        
                        // Handle "List of Rows" (Success)
                        if (Array.isArray(data)) {
                            if (data.length > 0) {
                                let cols = Object.keys(data[0]).map(k => ({ field: k, sortable: true, filter: true }));
                                this.gridOptions.api.setColumnDefs(cols);
                                this.gridOptions.api.setRowData(data);
                            } else {
                                this.gridOptions.api.setRowData([]);
                            }
                        } 
                        // Handle "Error Object" (Failure)
                        else if (data.error) {
                            alert("Server Error: " + data.error);
                            this.gridOptions.api.setRowData([]);
                        }
                    } catch(e) { 
                        console.error(e);
                        alert("Connection Error"); 
                    }
                    this.gridOptions.api.hideOverlay();
                },

                // Step 1: Upload to Stage
                async handleStage(e) {
                    let file = e.target.files[0];
                    if(!file) return;
                    
                    this.statusMsg = "Analyzing Diff...";
                    let fd = new FormData();
                    fd.append("file", file);
                    
                    try {
                        let res = await fetch(`${this.apiUrl}/stage/${this.year}`, { method: "POST", body: fd });
                        let data = await res.json();
                        
                        if(data.status === "staged") {
                            this.stagingData = data;
                            this.statusMsg = "";
                            e.target.value = null; // Reset input
                        } else {
                            this.statusMsg = "❌ Error: " + (data.error || "Unknown");
                        }
                    } catch(err) { this.statusMsg = "❌ Connection Fail"; }
                },

                // Step 2: Commit
                async confirmCommit() {
                    if(!this.stagingData) return;
                    this.statusMsg = "Committing...";
                    
                    try {
                        let params = new URLSearchParams({
                            staging_id: this.stagingData.staging_id,
                            filename: this.stagingData.filename
                        });
                        
                        let res = await fetch(`${this.apiUrl}/commit/${this.year}?${params}`, { method: "POST" });
                        let resp = await res.json();
                        
                        if(resp.status === "success") {
                            alert("Database Updated Successfully!");
                            this.stagingData = null;
                            this.fetchVersions();
                            this.fetchData();
                        } else {
                            alert("Commit Failed: " + resp.error);
                        }
                    } catch(err) { alert("Commit Error"); }
                }
            }
        }
    </script>
</body>
</html>
