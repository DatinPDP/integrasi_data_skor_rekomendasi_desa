<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>404 - Page Not Found</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-slate-200 h-screen flex flex-col items-center justify-center font-mono">
  <div class="text-center space-y-4">
    <h1 class="text-9xl font-bold text-blue-500">404</h1>
    <h2 class="text-2xl font-bold uppercase tracking-widest">
      Page Not Found
    </h2>
    <p class="text-slate-400 max-w-md mx-auto">
      The page might have been removed, name changed, or is temporarily unavailable.
    </p>
    <div class="pt-8">
      <a href="/admin" class="px-6 py-3 border border-blue-500 text-blue-400 hover:bg-blue-500
              hover:text-white transition rounded uppercase text-sm font-bold">
        Return to Dashboard
      </a>
    </div>
  </div>
</body>

</html>
