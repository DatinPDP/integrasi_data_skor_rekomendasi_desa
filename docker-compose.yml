services:
  backend:
    build: .
    command: python desa_db/server.py
    restart: always
    volumes:
      - ./.config:/app/.config
      - ./desa_db/dbs:/app/desa_db/dbs
      - ./desa_db/staging:/app/desa_db/staging
    env_file:
      - .env

  frontend:
    build: .
    command: python front_end/router.py
    restart: always
    environment:
      # Internal Docker URL for SSR Login
      - API_BASE_URL=http://backend:8000 
    volumes:
      - ./.config:/app/.config
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80" # This is the SINGLE port you will Tunnel
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
