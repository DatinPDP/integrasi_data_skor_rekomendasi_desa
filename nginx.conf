events {}

http {
  # --- UPLOAD SIZE LIMIT ---
  # Default is 1MB. We increase it to 150MB to allow large chunks/files.
  client_max_body_size 150M;

  server {
    listen 80;

    # --- TIMEOUT SETTINGS ---
    # Default is 60s. We increase it to 10 minutes.
    proxy_read_timeout 600;
    proxy_connect_timeout 600;
    proxy_send_timeout 600;

    # --- BACKEND ROUTES (Direct to Port 8000) ---
    location ~ ^/(api|config|upload|stage|commit|query|history|download|dashboard|delete) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- FRONTEND ROUTES (Direct to Port 8001) ---
    # Login page, Admin page, Root, Logout
    location / {
        proxy_pass http://frontend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
